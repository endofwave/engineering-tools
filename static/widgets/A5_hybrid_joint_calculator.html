<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A5 — Hybrid Joint Optimization Calculator</title>
  
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'IBM Plex Sans', sans-serif;
      background: #0a0e17;
      color: #e2e8f0;
      padding: 20px;
      background-image:
        repeating-linear-gradient(0deg, transparent, transparent 39px,

        repeating-linear-gradient(90deg, transparent, transparent 39px,
          #111d33 39px, #111d33 40px);
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
    }

    .header {
      text-align: center;
      margin-bottom: 30px;
      padding: 30px;
      background: #0f1929;
      border: 1px solid #1a2440;
      border-radius: 8px;
    }

    .header h1 {
      font-family: 'JetBrains Mono', monospace;
      font-size: 28px;
      color: #22d3ee;
      margin-bottom: 10px;
      font-weight: 700;
    }

    .header .subtitle {
      font-size: 16px;
      color: #94a3b8;
      margin-bottom: 8px;
    }

    .header .reference {
      font-size: 13px;
      color: #64748b;
      font-style: italic;
    }

    .presets-container {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-bottom: 30px;
      flex-wrap: wrap;
    }

    .preset-btn {
      padding: 12px 24px;
      background: #0f1929;
      border: 2px solid #1a2440;
      border-radius: 24px;
      color: #94a3b8;
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 14px;

      cursor: pointer;

    .preset-btn:hover {
      border-color: #22d3ee;
      color: #22d3ee;
    }

    .preset-btn.active {
      background: #22d3ee;
      color: #0a0e17;
      border-color: #22d3ee;
    }

    .band {
      display: grid;
      gap: 20px;
      margin-bottom: 20px;
    }

    .band-1 {
      grid-template-columns: 45% 55%;

    .band-2 {
      grid-template-columns: 55% 45%;

    .card {

      border: 1px solid #1a2440;
      border-radius: 8px;

    .card-title {

      border-radius: 4px;

      font-size: 13px;

    .input-unit {

      text-align: center;

    .footer {

    @media (max-width: 800px) {
      .band-1, .band-2 {

      }

      .result-secondary {
        grid-template-columns: repeat(2, 1fr);
      }
    }

<body>
  <div id="root"></div>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect, useRef, useMemo } = React;

    // ================================================================
    // MATERIAL DATABASE — Table 1 of Croccolo et al. (2012)
    // ================================================================
    const MATERIALS = {
      "ZM21 Magnesium":     { rho: 1.74e-6, E: 41000,  nu: 0.35, Sy: 195 },
      "EN-AW6082 Aluminum": { rho: 2.75e-6, E: 69000,  nu: 0.33, Sy: 304 },
      "Ti6Al4V Titanium":   { rho: 4.54e-6, E: 106000, nu: 0.34, Sy: 830 },
      "39NiCrMo3 Steel":    { rho: 7.87e-6, E: 207000, nu: 0.29, Sy: 910 }
    };

    // ================================================================
    // SCENARIO PRESETS — §4.1 of the paper
    // ================================================================
    const SCENARIOS = {
      a: { name: "(a) Solid, dry",        shaftMat: "39NiCrMo3 Steel", hubMat: "EN-AW6082 Aluminum", Qs: 0,   T: 1000, tau_allow: 350, mu: 0.4, tau_ad: 0  },
      b: { name: "(b) Hollow, dry",       shaftMat: "39NiCrMo3 Steel", hubMat: "EN-AW6082 Aluminum", Qs: 0.7, T: 1000, tau_allow: 350, mu: 0.4, tau_ad: 0  },
      c: { name: "(c) Hollow + adhesive", shaftMat: "39NiCrMo3 Steel", hubMat: "EN-AW6082 Aluminum", Qs: 0.7, T: 1000, tau_allow: 350, mu: 0.4, tau_ad: 10 }
    };

    // ================================================================
    // ENGINE FUNCTIONS — direct translation from A5_DFLS_optimization.ipynb
    // Each function implements one closed-form equation from the paper.
    // ================================================================

    /** Normalizing parameter phi, Eq. (24) of the paper. */
    function phiParam(Q_S, rho_S, rho_H) {
      return (1 - Q_S * Q_S) * rho_S / rho_H;
    }

    /** Normalizing parameter chi, Eq. (28) of the paper. */
    function chiParam(tau_ad, Sy_H) {
      return 2 * tau_ad / Sy_H;
    }

    /** Coupling diameter from torsional strength, Eq. (30) of the paper.
     *  Note: paper uses (1 - Q_S^3) which is a known typo for the polar
     *  section modulus; correct form is (1 - Q_S^4). We keep the paper's
     *  form for verification consistency. T in N·mm. */
    function dcFromTorsion(T_Nmm, tau_allow, Q_S) {
      var denom = 1 - Q_S * Q_S * Q_S;
      if (denom < 1e-12) return null;
      return Math.pow(16 * T_Nmm / (Math.PI * tau_allow * denom), 1 / 3);
    }

    /** Optimal hub aspect ratio WITHOUT adhesive, Eq. (25) of the paper.
     *  Handles the phi -> 1 limit analytically: Q_H_opt -> 1/sqrt(2). */
    function qHoptNoAdhesive(phi) {
      if (Math.abs(phi - 1) < 1e-6) return 1 / Math.sqrt(2);
      var num = 1 - Math.sqrt(phi);
      var den = 1 - phi;
      var ratio = num / den;
      if (ratio < 0) return null;
      return Math.sqrt(ratio);
    }

    /** Optimal hub aspect ratio WITH adhesive, Eq. (29) of the paper.
     *  Falls back to Eq. (25) for chi = 0. */
    function qHoptWithAdhesive(phi, chi, mu) {
      if (chi < 1e-9) return qHoptNoAdhesive(phi);
      var chi2 = chi * chi;
      var sqrt1mchi2 = Math.sqrt(1 - chi2);
      var inner = (1 / (1 - chi2)) * (phi - (chi / mu) * sqrt1mchi2 * (1 - phi));
      if (inner < 0) return null;
      var num = 1 - Math.sqrt(inner);
      var den = 1 - phi;
      if (Math.abs(den) < 1e-12) return 1 / Math.sqrt(2);
      var ratio = num / den;
      if (ratio < 0) return null;
      return Math.sqrt(ratio);
    }

    /** Dispatch to correct Q_H_opt formula based on tau_ad. */
    function qHopt(phi, chi, mu, tau_ad) {
      if (tau_ad < 1e-9) return qHoptNoAdhesive(phi);
      return qHoptWithAdhesive(phi, chi, mu);
    }

    /** Maximum coupling pressure from Tresca yielding at hub inner surface,
     *  Eq. (12) of the paper. Returns null if not feasible. */
    function pCTresca(Q_H, mu, tau_ad, Sy_H) {
      var qh2 = Q_H * Q_H;
      var denom = 1 - qh2;
      if (Math.abs(denom) < 1e-12) return null;
      var a = 4 * (1 / (denom * denom) + mu * mu);
      var b = 8 * mu * tau_ad;
      var c = 4 * tau_ad * tau_ad - Sy_H * Sy_H;
      var disc = b * b - 4 * a * c;
      if (disc < 0) return null;
      var pC = (-b + Math.sqrt(disc)) / (2 * a);
      return pC > 0 ? pC : null;
    }

    /** Coupling length required to transmit torque T, from Eq. (6).
     *  T in N·mm, returns L_C in mm. */
    function lcFromTorque(T_Nmm, pC, DC, mu, tau_ad) {
      var denom = (mu * pC + tau_ad) * Math.PI * DC * DC;
      if (denom < 1e-12) return null;
      return 2 * T_Nmm / denom;
    }

    /** Required diametral interference to produce pressure p_C, Eq. (3).
     *  Returns Z in mm. */
    function interferenceZ(pC, DC, Q_S, Q_H, E_S, nu_S, E_H, nu_H) {
      var qh2 = Q_H * Q_H;
      var qs2 = Q_S * Q_S;
      var termH = (1 + qh2) / (1 - qh2) + nu_H;
      var termS = (1 + qs2) / (1 - qs2) - nu_S;
      return pC * DC * (termH / E_H + termS / E_S);
    }

    /** Total joint mass, Eq. (7). Diameters in mm, rho in kg/mm³.
     *  Returns mass in kg. */
    function jointMass(DC, DSi, DHe, LC, rho_S, rho_H) {
      return Math.PI / 4 * ((DC * DC - DSi * DSi) * rho_S + (DHe * DHe - DC * DC) * rho_H) * LC;
    }

    // ================================================================
    // FULL PIPELINE — mirrors optimize_joint() from the notebook
    // ================================================================
    function computePipeline(inp) {
      var T_Nmm = inp.T_Nm * 1000;

      // Step 1 — Shaft sizing
      var D_C = dcFromTorsion(T_Nmm, inp.tau_allow, inp.Q_S);
      if (D_C === null) return { error: "Invalid shaft sizing (Q_S too close to 1)" };

      // Step 2 — Normalizing parameters
      var phi = phiParam(inp.Q_S, inp.rho_S, inp.rho_H);
      var chi = chiParam(inp.tau_ad, inp.Sy_H);

      // Step 3 — Optimal hub ratio
      var Q_H = qHopt(phi, chi, inp.mu, inp.tau_ad);
      if (Q_H === null || isNaN(Q_H)) return { error: "No feasible optimum for these inputs", D_C: D_C, phi: phi, chi: chi };

      // Step 4 — Tresca pressure
      var p_C = pCTresca(Q_H, inp.mu, inp.tau_ad, inp.Sy_H);
      if (p_C === null) return { error: "Tresca limit not feasible", D_C: D_C, phi: phi, chi: chi, Q_H_opt: Q_H };

      // Step 5 — Geometry
      var D_Si = inp.Q_S * D_C;
      var D_He = D_C / Q_H;
      var L_C = lcFromTorque(T_Nmm, p_C, D_C, inp.mu, inp.tau_ad);
      if (L_C === null) return { error: "Invalid coupling length" };
      var Z = interferenceZ(p_C, D_C, inp.Q_S, Q_H, inp.E_S, inp.nu_S, inp.E_H, inp.nu_H);
      var mass_kg = jointMass(D_C, D_Si, D_He, L_C, inp.rho_S, inp.rho_H);

      // Step 6 — Design merit
      var DFLS_T = inp.T_Nm / mass_kg;        // N·m/kg
      var DFLS_T_kNm = DFLS_T / 1000;         // kN·m/kg

      return {
        error: null,
        D_C: D_C, phi: phi, chi: chi,
        Q_H_opt: Q_H, p_C: p_C,
        L_C: L_C, D_Si: D_Si, D_He: D_He,
        Z: Z, mass_kg: mass_kg, mass_g: mass_kg * 1000,
        DFLS_T: DFLS_T, DFLS_T_kNm: DFLS_T_kNm
      };
    }

    // ================================================================
    // CHART SWEEP — DFLS_T at a given Q_H for current inputs
    // ================================================================
    function dflsAtQH(Q_H, Q_S, D_C, mu, tau_ad, Sy_H, T_Nmm, rho_S, rho_H) {
      var pC = pCTresca(Q_H, mu, tau_ad, Sy_H);
      if (pC === null || pC <= 0) return 0;
      var LC = lcFromTorque(T_Nmm, pC, D_C, mu, tau_ad);
      if (LC === null || LC <= 0) return 0;
      var DSi = Q_S * D_C;
      var DHe = D_C / Q_H;
      var m = jointMass(D_C, DSi, DHe, LC, rho_S, rho_H);
      if (m <= 0) return 0;
      return (T_Nmm / 1000) / m / 1000; // kN·m/kg
    }

    function sweepCurve(Q_S, D_C, mu, tau_ad, Sy_H, T_Nmm, rho_S, rho_H) {
      var pts = [];
      for (var qh = 0.05; qh <= 0.98; qh += 0.005) {
        pts.push({ qh: qh, dfls: dflsAtQH(qh, Q_S, D_C, mu, tau_ad, Sy_H, T_Nmm, rho_S, rho_H) });
      }
      return pts;
    }

    // ================================================================
    // REFERENCE CURVES — fixed scenarios for chart background
    // ================================================================
    function computeRefCurves() {
      var steel = MATERIALS["39NiCrMo3 Steel"];
      var alu = MATERIALS["EN-AW6082 Aluminum"];
      var T_Nmm = 1e6;
      var tau_allow = 350;
      var mu = 0.4;
      var refs = [
        { Q_S: 0,   tau_ad: 0,  color: "#d62728", label: "(a) solid, dry" },
        { Q_S: 0.7, tau_ad: 0,  color: "#2ca02c", label: "(b) hollow, dry" },
        { Q_S: 0.7, tau_ad: 10, color: "#1f77b4", label: "(c) hollow + adhesive" }
      ];
      return refs.map(function(r) {
        var DC = dcFromTorsion(T_Nmm, tau_allow, r.Q_S);
        var pts = sweepCurve(r.Q_S, DC, mu, r.tau_ad, alu.Sy, T_Nmm, steel.rho, alu.rho);
        // Find peak for marker
        var peak = pts.reduce(function(best, p) { return p.dfls > best.dfls ? p : best; }, pts[0]);
        return { pts: pts, peak: peak, color: r.color, label: r.label };
      });
    }

    var REF_CURVES = computeRefCurves();

    // ================================================================
    // REACT APPLICATION
    // ================================================================
    function App() {
      // --- Input states (default: scenario c) ---
      const [shaftMaterial, setShaftMaterial] = useState("39NiCrMo3 Steel");
      const [hubMaterial, setHubMaterial] = useState("EN-AW6082 Aluminum");
      const [rhoS, setRhoS] = useState(7.87e-6);
      const [ES, setES] = useState(207000);
      const [nuS, setNuS] = useState(0.29);
      const [rhoH, setRhoH] = useState(2.75e-6);
      const [EH, setEH] = useState(69000);
      const [nuH, setNuH] = useState(0.33);
      const [SyH, setSyH] = useState(304);
      const [Qs, setQs] = useState(0.7);
      const [T, setT] = useState(1000);
      const [tauAllow, setTauAllow] = useState(350);
      const [mu, setMu] = useState(0.4);
      const [tauAd, setTauAd] = useState(10);

      const [activePreset, setActivePreset] = useState('c');
      const [openAccordion, setOpenAccordion] = useState(null);
      const chartRef = useRef(null);

      // --- Compute pipeline whenever inputs change ---
      const results = useMemo(function() {
        return computePipeline({
          Q_S: Qs, T_Nm: T, tau_allow: tauAllow, mu: mu, tau_ad: tauAd,
          rho_S: rhoS, E_S: ES, nu_S: nuS,
          rho_H: rhoH, E_H: EH, nu_H: nuH, Sy_H: SyH
        });
      }, [Qs, T, tauAllow, mu, tauAd, rhoS, ES, nuS, rhoH, EH, nuH, SyH]);

      // --- Current curve for chart ---
      const currentCurve = useMemo(function() {
        if (results.error && !results.D_C) return null;
        var DC = results.D_C || dcFromTorsion(T * 1000, tauAllow, Qs);
        if (!DC) return null;
        var pts = sweepCurve(Qs, DC, mu, tauAd, SyH, T * 1000, rhoS, rhoH);
        var peak = pts.reduce(function(best, p) { return p.dfls > best.dfls ? p : best; }, pts[0]);
        return { pts: pts, peak: peak };
      }, [Qs, T, tauAllow, mu, tauAd, rhoS, rhoH, SyH]);

      // --- Handlers ---
      const handleShaftMaterialChange = function(matName) {
        setShaftMaterial(matName);
        var mat = MATERIALS[matName];
        setRhoS(mat.rho); setES(mat.E); setNuS(mat.nu);
        setActivePreset(null);
      };

      const handleHubMaterialChange = function(matName) {
        setHubMaterial(matName);
        var mat = MATERIALS[matName];
        setRhoH(mat.rho); setEH(mat.E); setNuH(mat.nu); setSyH(mat.Sy);
        setActivePreset(null);
      };

      const handlePreset = function(key) {
        var sc = SCENARIOS[key];
        setShaftMaterial(sc.shaftMat);
        setHubMaterial(sc.hubMat);
        var sM = MATERIALS[sc.shaftMat];
        var hM = MATERIALS[sc.hubMat];
        setRhoS(sM.rho); setES(sM.E); setNuS(sM.nu);
        setRhoH(hM.rho); setEH(hM.E); setNuH(hM.nu); setSyH(hM.Sy);
        setQs(sc.Qs); setT(sc.T); setTauAllow(sc.tau_allow);
        setMu(sc.mu); setTauAd(sc.tau_ad);
        setActivePreset(key);
      };

      const handleInputChange = function(setter) {
        return function(e) {
          var v = parseFloat(e.target.value);
          if (!isNaN(v)) setter(v);
          setActivePreset(null);
        };
      };

      const toggleAccordion = function(index) {
        setOpenAccordion(openAccordion === index ? null : index);
      };

      // --- Chart rendering with ResizeObserver ---
      useEffect(function() {
        var canvas = chartRef.current;
        if (!canvas) return;

        var draw = function() {
          var w = canvas.clientWidth;
          var h = canvas.clientHeight;
          canvas.width = w;
          canvas.height = h;
          var ctx = canvas.getContext('2d');
          ctx.clearRect(0, 0, w, h);

          var margin = { top: 40, right: 40, bottom: 50, left: 60 };
          var cw = w - margin.left - margin.right;
          var ch = h - margin.top - margin.bottom;

          // Determine Y max from all curves
          var yMax = 14;
          if (currentCurve) {
            var curMax = currentCurve.peak.dfls;
            if (curMax > yMax * 0.85) yMax = Math.ceil(curMax * 1.15 / 2) * 2;
          }

          var xScale = function(qh) { return margin.left + qh * cw; };
          var yScale = function(d) { return margin.top + ch - (d / yMax) * ch; };

          // Grid
          ctx.strokeStyle = '#1a2440';
          ctx.lineWidth = 1;
          for (var i = 0; i <= 10; i++) {
            var gy = margin.top + (i / 10) * ch;
            ctx.beginPath(); ctx.moveTo(margin.left, gy); ctx.lineTo(w - margin.right, gy); ctx.stroke();
          }
          for (var i = 0; i <= 10; i++) {
            var gx = margin.left + (i / 10) * cw;
            ctx.beginPath(); ctx.moveTo(gx, margin.top); ctx.lineTo(gx, h - margin.bottom); ctx.stroke();
          }

          // Axes
          ctx.strokeStyle = '#22d3ee';
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.moveTo(margin.left, margin.top);
          ctx.lineTo(margin.left, h - margin.bottom);
          ctx.lineTo(w - margin.right, h - margin.bottom);
          ctx.stroke();

          // Axis labels
          ctx.save();
          ctx.translate(20, h / 2);
          ctx.rotate(-Math.PI / 2);
          ctx.fillStyle = '#e2e8f0';
          ctx.font = '13px JetBrains Mono';
          ctx.textAlign = 'center';
          ctx.fillText('DFLS_T  [kN\u00b7m/kg]', 0, 0);
          ctx.restore();

          ctx.fillStyle = '#e2e8f0';
          ctx.font = '13px JetBrains Mono';
          ctx.textAlign = 'center';
          ctx.fillText('Q_H = D_C / D_He  [\u2014]', w / 2, h - 15);

          // Y ticks
          ctx.fillStyle = '#94a3b8';
          ctx.font = '11px JetBrains Mono';
          ctx.textAlign = 'right';
          var yStep = yMax <= 14 ? 2 : Math.ceil(yMax / 7);
          for (var v = 0; v <= yMax; v += yStep) {
            ctx.fillText(v.toString(), margin.left - 8, yScale(v) + 4);
          }

          // X ticks
          ctx.textAlign = 'center';
          for (var x = 0; x <= 1.001; x += 0.2) {
            ctx.fillText(x.toFixed(1), xScale(x), h - margin.bottom + 20);
          }

          // Helper: draw a curve
          var drawCurve = function(pts, color, alpha, lineW) {
            ctx.save();
            ctx.globalAlpha = alpha;
            ctx.strokeStyle = color;
            ctx.lineWidth = lineW;
            ctx.beginPath();
            pts.forEach(function(p, i) {
              var px = xScale(p.qh);
              var py = yScale(p.dfls);
              if (i === 0) ctx.moveTo(px, py);
              else ctx.lineTo(px, py);
            });
            ctx.stroke();
            ctx.restore();
          };

          // Reference curves (faded)
          REF_CURVES.forEach(function(rc) {
            drawCurve(rc.pts, rc.color, 0.35, 2);
            // Faded peak marker
            ctx.save();
            ctx.globalAlpha = 0.35;
            ctx.fillStyle = rc.color;
            ctx.beginPath();
            ctx.arc(xScale(rc.peak.qh), yScale(rc.peak.dfls), 4, 0, 2 * Math.PI);
            ctx.fill();
            ctx.restore();
          });

          // Current curve (full opacity, cyan, thick)
          if (currentCurve && currentCurve.pts.length > 0) {
            drawCurve(currentCurve.pts, '#22d3ee', 1.0, 3);
            // Peak marker with border
            var px = xScale(currentCurve.peak.qh);
            var py = yScale(currentCurve.peak.dfls);
            ctx.fillStyle = '#22d3ee';
            ctx.beginPath();
            ctx.arc(px, py, 6, 0, 2 * Math.PI);
            ctx.fill();
            ctx.strokeStyle = '#0a0e17';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(px, py, 6, 0, 2 * Math.PI);
            ctx.stroke();
            // Value label near marker
            ctx.fillStyle = '#f59e0b';
            ctx.font = '600 12px JetBrains Mono';
            ctx.textAlign = 'left';
            ctx.fillText(currentCurve.peak.dfls.toFixed(1) + ' kN\u00b7m/kg', px + 12, py - 4);
          }

          // Legend
          var lx = margin.left + 20;
          var ly = margin.top + 20;
          ctx.font = '12px IBM Plex Sans';
          ctx.globalAlpha = 0.5;
          REF_CURVES.forEach(function(rc) {
            ctx.fillStyle = rc.color;
            ctx.fillRect(lx, ly - 8, 16, 3);
            ctx.fillStyle = '#e2e8f0';
            ctx.textAlign = 'left';
            ctx.fillText(rc.label, lx + 22, ly);
            ly += 20;
          });
          ctx.globalAlpha = 1.0;
          // Current inputs legend entry
          ctx.fillStyle = '#22d3ee';
          ctx.fillRect(lx, ly - 8, 16, 3);
          ctx.fillStyle = '#e2e8f0';
          ctx.fillText('current inputs', lx + 22, ly);
        };

        draw();

        var observer = new ResizeObserver(draw);
        observer.observe(canvas.parentElement);
        return function() { observer.disconnect(); };
      }, [currentCurve]);

      // --- Accordion steps with live values ---
      var ok = !results.error;
      var accordionSteps = [
        {
          title: "Step 1 \u2014 Shaft sizing",
          formula: "D_C = (16T / (\u03c0 \u00b7 \u03c4_allow \u00b7 (1 \u2212 Q_S\u00b3)))^(1/3)",
          result: ok ? "D_C = " + results.D_C.toFixed(1) + " mm" : "\u2014"
        },
        {
          title: "Step 2 \u2014 Normalizing parameters",
          formula: "\u03c6 = (1 \u2212 Q_S\u00b2) \u00b7 \u03c1_S/\u03c1_H  ;  \u03c7 = 2\u03c4_ad / S_y_H",
          result: ok ? "\u03c6 = " + results.phi.toFixed(3) + ",  \u03c7 = " + results.chi.toFixed(4) : "\u2014"
        },
        {
          title: "Step 3 \u2014 Optimal hub ratio",
          formula: tauAd > 0
            ? "Q_H_opt = \u221a[(1 \u2212 \u221a(f(\u03c6,\u03c7,\u03bc))) / (1 \u2212 \u03c6)]   (Eq. 29)"
            : "Q_H_opt = \u221a[(1 \u2212 \u221a\u03c6) / (1 \u2212 \u03c6)]   (Eq. 25)",
          result: ok ? "Q_H_opt = " + results.Q_H_opt.toFixed(4) : "\u2014"
        },
        {
          title: "Step 4 \u2014 Tresca pressure limit",
          formula: "p_C = [\u2212b + \u221a(b\u00b2 \u2212 4ac)] / 2a   (Eq. 12)",
          result: ok ? "p_C = " + results.p_C.toFixed(1) + " MPa" : "\u2014"
        },
        {
          title: "Step 5 \u2014 Joint geometry",
          formula: "L_C = 2T / [(\u03bc\u00b7p_C + \u03c4_ad) \u00b7 \u03c0 \u00b7 D_C\u00b2]\nD_He = D_C / Q_H\nZ = p_C \u00b7 D_C \u00b7 [(\u2026)/E_H + (\u2026)/E_S]",
          result: ok ? "L_C = " + results.L_C.toFixed(1) + " mm,  D_He = " + results.D_He.toFixed(1) + " mm,  Z = " + results.Z.toFixed(4) + " mm" : "\u2014"
        },
        {
          title: "Step 6 \u2014 Design merit",
          formula: "m = (\u03c0/4) \u00b7 [(D_C\u00b2 \u2212 D_Si\u00b2)\u03c1_S + (D_He\u00b2 \u2212 D_C\u00b2)\u03c1_H] \u00b7 L_C\nDFLS_T = T / m",
          result: ok ? "mass = " + results.mass_g.toFixed(1) + " g,  DFLS_T = " + results.DFLS_T_kNm.toFixed(2) + " kN\u00b7m/kg" : "\u2014"
        }
      ];

      // --- Format helper ---
      var fmt = function(val, dec) { return (val !== undefined && val !== null) ? val.toFixed(dec) : '\u2014'; };

      // --- Render ---
      return (
        <div className="container">
          {/* Header */}
          <div className="header">
            <h1>A5 — Hybrid Joint Optimization Calculator</h1>
            <div className="subtitle">Optimal shaft–hub design for lightweight structures (torque)</div>
            <div className="reference">Croccolo, De Agostinis & Vincenzi (2012), Int. J. Mechanical Sciences 56, 77–85</div>
          </div>

          {/* === JACK-F: SCENARIO PRESETS === */}
          <div className="presets-container">
            {Object.keys(SCENARIOS).map(function(key) {
              return (
                <button key={key}
                  className={"preset-btn" + (activePreset === key ? " active" : "")}
                  onClick={function() { handlePreset(key); }}
                >{SCENARIOS[key].name}</button>
              );
            })}
          </div>

          {/* Band 1: Inputs + Diagram */}
          <div className="band band-1">
            {/* === JACK-A: INPUT FIELDS === */}
            <div className="card">
              <div className="card-title">Input Parameters</div>

              {/* Shaft Material */}
              <div className="input-group">
                <div className="input-group-label">Shaft Material</div>
                <div className="input-row">
                  <div className="input-label">Material</div>
                  <div className="input-unit">—</div>
                  <select value={shaftMaterial} onChange={function(e) { handleShaftMaterialChange(e.target.value); }}>
                    {Object.keys(MATERIALS).map(function(mat) { return <option key={mat} value={mat}>{mat}</option>; })}
                  </select>
                </div>
                <div className="input-row">
                  <div className="input-label">Density ρ_S</div>
                  <div className="input-unit">kg/mm³</div>
                  <input type="number" className="input-field" value={rhoS} onChange={handleInputChange(setRhoS)} step="1e-7" />
                </div>
                <div className="input-row">
                  <div className="input-label">Young's modulus E_S</div>
                  <div className="input-unit">MPa</div>
                  <input type="number" className="input-field" value={ES} onChange={handleInputChange(setES)} />
                </div>
                <div className="input-row">
                  <div className="input-label">Poisson's ratio ν_S</div>
                  <div className="input-unit">—</div>
                  <input type="number" className="input-field" value={nuS} onChange={handleInputChange(setNuS)} step="0.01" />
                </div>
              </div>

              {/* Hub Material */}
              <div className="input-group">
                <div className="input-group-label">Hub Material</div>
                <div className="input-row">
                  <div className="input-label">Material</div>
                  <div className="input-unit">—</div>
                  <select value={hubMaterial} onChange={function(e) { handleHubMaterialChange(e.target.value); }}>
                    {Object.keys(MATERIALS).map(function(mat) { return <option key={mat} value={mat}>{mat}</option>; })}
                  </select>
                </div>
                <div className="input-row">
                  <div className="input-label">Density ρ_H</div>
                  <div className="input-unit">kg/mm³</div>
                  <input type="number" className="input-field" value={rhoH} onChange={handleInputChange(setRhoH)} step="1e-7" />
                </div>
                <div className="input-row">
                  <div className="input-label">Young's modulus E_H</div>
                  <div className="input-unit">MPa</div>
                  <input type="number" className="input-field" value={EH} onChange={handleInputChange(setEH)} />
                </div>
                <div className="input-row">
                  <div className="input-label">Poisson's ratio ν_H</div>
                  <div className="input-unit">—</div>
                  <input type="number" className="input-field" value={nuH} onChange={handleInputChange(setNuH)} step="0.01" />
                </div>
                <div className="input-row">
                  <div className="input-label">Yield strength S_y_H</div>
                  <div className="input-unit">MPa</div>
                  <input type="number" className="input-field" value={SyH} onChange={handleInputChange(setSyH)} />
                </div>
              </div>

              {/* Geometry & Loading */}
              <div className="input-group">
                <div className="input-group-label">Geometry & Loading</div>
                <div className="input-row">
                  <div className="input-label">Shaft bore ratio Q_S</div>
                  <div className="input-unit">—</div>
                  <input type="number" className="input-field" value={Qs} onChange={handleInputChange(setQs)} step="0.1" />
                </div>
                <div className="input-row">
                  <div className="input-label">Required torque T</div>
                  <div className="input-unit">N·m</div>
                  <input type="number" className="input-field" value={T} onChange={handleInputChange(setT)} />
                </div>
                <div className="input-row">
                  <div className="input-label">Allowable shaft shear τ_allow</div>
                  <div className="input-unit">MPa</div>
                  <input type="number" className="input-field" value={tauAllow} onChange={handleInputChange(setTauAllow)} />
                </div>
                <div className="input-row">
                  <div className="input-label">Friction coefficient μ_T</div>
                  <div className="input-unit">—</div>
                  <input type="number" className="input-field" value={mu} onChange={handleInputChange(setMu)} step="0.1" />
                </div>
                <div className="input-row">
                  <div className="input-label">Adhesive shear strength τ_ad</div>
                  <div className="input-unit">MPa</div>
                  <input type="number" className="input-field" value={tauAd} onChange={handleInputChange(setTauAd)} />
                </div>
              </div>
            </div>

            {/* === JACK-B: DIAGRAM IMAGE === */}
            <div className="card">
              <div className="card-title">Load Transfer Mechanisms</div>
              <div className="diagram-container">
                <img
                  src="A5_gpt_hybrid_joint_mechanisms.jpg"
                  alt="Hybrid joint load transfer mechanisms diagram"
                />
              </div>
            </div>
          </div>

          {/* Status Badge */}
          <div className={results.error ? "status-badge status-err" : "status-badge status-ok"}>
            {results.error
              ? "\u2717 " + results.error
              : "\u2713 OPTIMIZED — DFLS_T = " + results.DFLS_T_kNm.toFixed(2) + " kN·m/kg"}
          </div>

          {/* Band 2: Chart + Results */}
          <div className="band band-2">
            {/* === JACK-C: CANVAS CHART === */}
            <div className="card">
              <div className="card-title">Optimization Curve</div>
              <div className="chart-container">
                <canvas ref={chartRef}></canvas>
              </div>
            </div>

            {/* === JACK-D: RESULTS TABLE === */}
            <div className="card">
              <div className="card-title">Results</div>
              <div className="results-grid">
                <div className="result-primary">
                  <div className="result-box">
                    <div className="result-box-label">Optimal hub ratio</div>
                    <div className="result-box-value">
                      {ok ? fmt(results.Q_H_opt, 3) : '\u2014'}
                      <span className="result-box-unit">—</span>
                    </div>
                  </div>
                  <div className="result-box">
                    <div className="result-box-label">Design merit</div>
                    <div className="result-box-value">
                      {ok ? fmt(results.DFLS_T_kNm, 2) : '\u2014'}
                      <span className="result-box-unit">kN·m/kg</span>
                    </div>
                  </div>
                  <div className="result-box">
                    <div className="result-box-label">Hub outer diameter</div>
                    <div className="result-box-value">
                      {ok ? fmt(results.D_He, 1) : '\u2014'}
                      <span className="result-box-unit">mm</span>
                    </div>
                  </div>
                  <div className="result-box">
                    <div className="result-box-label">Total mass</div>
                    <div className="result-box-value">
                      {ok ? fmt(results.mass_g, 1) : '\u2014'}
                      <span className="result-box-unit">g</span>
                    </div>
                  </div>
                </div>

                <div className="result-secondary">
                  <div className="result-mini">
                    <div className="result-mini-label">D_C</div>
                    <div className="result-mini-value">{ok ? fmt(results.D_C, 1) + ' mm' : '\u2014'}</div>
                  </div>
                  <div className="result-mini">
                    <div className="result-mini-label">p_C</div>
                    <div className="result-mini-value">{ok ? fmt(results.p_C, 1) + ' MPa' : '\u2014'}</div>
                  </div>
                  <div className="result-mini">
                    <div className="result-mini-label">L_C</div>
                    <div className="result-mini-value">{ok ? fmt(results.L_C, 1) + ' mm' : '\u2014'}</div>
                  </div>
                  <div className="result-mini">
                    <div className="result-mini-label">Z</div>
                    <div className="result-mini-value">{ok ? fmt(results.Z, 4) + ' mm' : '\u2014'}</div>
                  </div>
                  <div className="result-mini">
                    <div className="result-mini-label">φ</div>
                    <div className="result-mini-value">{ok ? fmt(results.phi, 3) : '\u2014'}</div>
                  </div>
                  <div className="result-mini">
                    <div className="result-mini-label">χ</div>
                    <div className="result-mini-value">{ok ? fmt(results.chi, 4) : '\u2014'}</div>
                  </div>
                </div>
              </div>
            </div>
          </div>

          {/* Band 3: Pipeline Accordion */}
          {/* === JACK-E: PIPELINE ACCORDION === */}
          <div className="card">
            <div className="card-title">Calculation Pipeline</div>
            <div className="accordion">
              {accordionSteps.map(function(step, index) {
                return (
                  <div key={index}
                    className={"accordion-item" + (openAccordion === index ? " open" : "")}
                  >
                    <div className="accordion-header" onClick={function() { toggleAccordion(index); }}>
                      <div className="accordion-title">{step.title}</div>
                      <div className="accordion-icon">▼</div>
                    </div>
                    <div className="accordion-content">
                      <div className="accordion-body">
                        <div className="formula">{step.formula}</div>
                        <div className="result-highlight">→ {step.result}</div>
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>

          {/* Footer */}
          <div className="footer">
            <div className="footer-section">
              <div className="footer-title">Paper Citation</div>
              <div className="footer-text">
                Croccolo, D., De Agostinis, M. & Vincenzi, N. (2012). Design and
                optimization of shaft–hub hybrid joints for lightweight structures.
                <em> International Journal of Mechanical Sciences</em>, 56(1), 77–85.
              </div>
            </div>
            <div className="footer-section">
              <div className="footer-title">Key Assumptions</div>
              <ul>
                <li>Plane stress, axisymmetric geometry</li>
                <li>Hub yielding governs (Tresca criterion at inner surface)</li>
                <li>Approximation μ² ≪ 1/(1−Q_H²)² (error &lt; 5%)</li>
                <li>Static torque only; no fatigue, no dynamic loads</li>
                <li>Shaft buckling limit: Q_S ≤ 0.8 (not checked by this tool)</li>
              </ul>
            </div>
            <div className="footer-section">
              <div className="footer-text" style={{fontSize:'11px', color:'#64748b'}}>
                Results are provided "as is" for educational and verification purposes.
                They do not substitute professional engineering judgment.
                The user is responsible for validating all results before use in any application.
              </div>
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
